unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

bind | split-window -h
bind - split-window -v

unbind '"'
unbind %

bind-key r source-file ~/.tmux.conf \; display-message "config reloaded"

set-option -g allow-rename off
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

set -s escape-time 0
